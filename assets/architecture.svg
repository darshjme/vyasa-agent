<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="archTitle archDesc">
  <title id="archTitle">Vyasa Agent — System Architecture</title>
  <desc id="archDesc">Vyasa Agent topology: a user phone with Telegram and WhatsApp icons connects to the Gateway on port 19000, which forwards to the Router. The Router dispatches to two clusters, Vyasa 18 and Graymatter 10. Both clusters read and write memory across three stores: Graphify SQLite, Qdrant vector index, and per-employee SQLite.</desc>

  <!-- background -->
  <rect width="1200" height="800" fill="#0F2E3D"/>
  <rect y="540" width="1200" height="260" fill="#0B2431" opacity="0.5"/>

  <!-- title block -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="#F6F1E5">
    <text x="40" y="48" font-size="22" letter-spacing="2">VYASA AGENT — ARCHITECTURE</text>
    <line x1="40" y1="58" x2="352" y2="58" stroke="#E28822" stroke-width="1"/>
    <text x="40" y="76" font-size="11" fill-opacity="0.55" letter-spacing="1.4">One daemon · 28 specialists · 3-tier memory · your box</text>
  </g>
  <text x="1160" y="48" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#F6F1E5" fill-opacity="0.55" letter-spacing="1.4">GRAYMATTER ONLINE LLP</text>

  <!-- layer labels (left rail) -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="#F6F1E5" fill-opacity="0.45" font-size="10" letter-spacing="2.2">
    <text x="28" y="152">CHANNEL</text>
    <text x="28" y="348">EDGE</text>
    <text x="28" y="464">ROUTING</text>
    <text x="28" y="588">FLEET</text>
    <text x="28" y="746">MEMORY</text>
  </g>

  <!-- USER PHONE + CHANNEL ICONS -->
  <g transform="translate(540,100)">
    <rect x="0" y="0" width="120" height="188" rx="16" ry="16" fill="#1A1A1A" stroke="#F6F1E5" stroke-width="1.2"/>
    <rect x="8" y="24" width="104" height="150" rx="6" ry="6" fill="#0F2E3D"/>
    <rect x="46" y="10" width="28" height="5" rx="2.5" ry="2.5" fill="#0F2E3D" stroke="#F6F1E5" stroke-opacity="0.35" stroke-width="0.5"/>
    <rect x="44" y="180" width="32" height="3" rx="1.5" ry="1.5" fill="#F6F1E5" fill-opacity="0.5"/>

    <!-- Telegram paper-plane glyph -->
    <g transform="translate(20,44)">
      <circle cx="14" cy="14" r="14" fill="#F6F1E5" fill-opacity="0.08" stroke="#F6F1E5" stroke-width="1"/>
      <path d="M 6 14 L 22 7 L 18 22 L 14 16 Z" fill="#F6F1E5"/>
    </g>
    <text x="56" y="62" font-family="Georgia, serif" font-size="10" fill="#F6F1E5" fill-opacity="0.85">Telegram</text>

    <!-- WhatsApp speech-bubble glyph -->
    <g transform="translate(20,90)">
      <circle cx="14" cy="14" r="14" fill="#F6F1E5" fill-opacity="0.08" stroke="#F6F1E5" stroke-width="1"/>
      <path d="M 5 10 Q 5 4 14 4 Q 23 4 23 12 Q 23 20 14 20 L 10 20 L 5 24 L 7 18 Q 5 14 5 10 Z" fill="none" stroke="#F6F1E5" stroke-width="1.2"/>
    </g>
    <text x="56" y="108" font-family="Georgia, serif" font-size="10" fill="#F6F1E5" fill-opacity="0.85">WhatsApp</text>

    <!-- tagline on screen -->
    <text x="60" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#F6F1E5" fill-opacity="0.55" letter-spacing="1.2">YOUR PHONE</text>
  </g>

  <!-- GATEWAY -->
  <g transform="translate(500,318)">
    <rect x="0" y="0" width="200" height="68" rx="10" ry="10" fill="#0F2E3D" stroke="#F6F1E5" stroke-width="1.4"/>
    <line x1="0" y1="0" x2="0" y2="68" stroke="#E28822" stroke-width="3"/>
    <text x="100" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#F6F1E5" letter-spacing="1.5">GATEWAY</text>
    <text x="100" y="48" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#F6F1E5" fill-opacity="0.6" letter-spacing="1.5">:19000 · single daemon</text>
  </g>

  <!-- ROUTER -->
  <g transform="translate(500,434)">
    <rect x="0" y="0" width="200" height="68" rx="10" ry="10" fill="#0F2E3D" stroke="#F6F1E5" stroke-width="1.4"/>
    <line x1="0" y1="0" x2="0" y2="68" stroke="#E28822" stroke-width="3"/>
    <text x="100" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#F6F1E5" letter-spacing="1.5">ROUTER</text>
    <text x="100" y="48" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#F6F1E5" fill-opacity="0.6" letter-spacing="1.5">intent · namespace · owner</text>
  </g>

  <!-- VYASA 18 CLUSTER -->
  <g transform="translate(140,556)">
    <rect x="0" y="0" width="340" height="158" rx="12" ry="12" fill="#0F2E3D" stroke="#F6F1E5" stroke-width="1.2"/>
    <rect x="0" y="0" width="340" height="28" rx="12" ry="12" fill="#E28822" fill-opacity="0.92"/>
    <rect x="0" y="16" width="340" height="12" fill="#E28822" fill-opacity="0.92"/>
    <text x="16" y="19" font-family="Georgia, serif" font-size="12" fill="#0F2E3D" letter-spacing="2">VYASA · 18 MYTHIC SPECIALISTS</text>

    <!-- 18 dots in a 6x3 grid -->
    <g fill="#F6F1E5" stroke="#E28822" stroke-width="1">
      <circle cx="40"  cy="64"  r="7"/>
      <circle cx="80"  cy="64"  r="7"/>
      <circle cx="120" cy="64"  r="7"/>
      <circle cx="160" cy="64"  r="7"/>
      <circle cx="200" cy="64"  r="7"/>
      <circle cx="240" cy="64"  r="7"/>
      <circle cx="40"  cy="98"  r="7"/>
      <circle cx="80"  cy="98"  r="7"/>
      <circle cx="120" cy="98"  r="7"/>
      <circle cx="160" cy="98"  r="7"/>
      <circle cx="200" cy="98"  r="7"/>
      <circle cx="240" cy="98"  r="7"/>
      <circle cx="40"  cy="132" r="7"/>
      <circle cx="80"  cy="132" r="7"/>
      <circle cx="120" cy="132" r="7"/>
      <circle cx="160" cy="132" r="7"/>
      <circle cx="200" cy="132" r="7"/>
      <circle cx="240" cy="132" r="7"/>
    </g>
    <text x="280" y="96"  font-family="Georgia, serif" font-size="10" fill="#F6F1E5" fill-opacity="0.65" letter-spacing="1.1">Vyasa</text>
    <text x="280" y="110" font-family="Georgia, serif" font-size="10" fill="#F6F1E5" fill-opacity="0.65" letter-spacing="1.1">Chanakya</text>
    <text x="280" y="124" font-family="Georgia, serif" font-size="10" fill="#F6F1E5" fill-opacity="0.65" letter-spacing="1.1">Kavach · 15</text>
  </g>

  <!-- GRAYMATTER 10 CLUSTER -->
  <g transform="translate(720,556)">
    <rect x="0" y="0" width="340" height="158" rx="12" ry="12" fill="#0F2E3D" stroke="#F6F1E5" stroke-width="1.2"/>
    <rect x="0" y="0" width="340" height="28" rx="12" ry="12" fill="#F6F1E5"/>
    <rect x="0" y="16" width="340" height="12" fill="#F6F1E5"/>
    <text x="16" y="19" font-family="Georgia, serif" font-size="12" fill="#0F2E3D" letter-spacing="2">GRAYMATTER · 10 DOCTORS</text>

    <g fill="#0F2E3D" stroke="#F6F1E5" stroke-width="1">
      <circle cx="50"  cy="72"  r="8"/>
      <circle cx="100" cy="72"  r="8"/>
      <circle cx="150" cy="72"  r="8"/>
      <circle cx="200" cy="72"  r="8"/>
      <circle cx="250" cy="72"  r="8"/>
      <circle cx="50"  cy="120" r="8"/>
      <circle cx="100" cy="120" r="8"/>
      <circle cx="150" cy="120" r="8"/>
      <circle cx="200" cy="120" r="8"/>
      <circle cx="250" cy="120" r="8"/>
    </g>
    <text x="288" y="90"  font-family="Georgia, serif" font-size="10" fill="#F6F1E5" fill-opacity="0.65" letter-spacing="1.1">Sarabhai</text>
    <text x="288" y="104" font-family="Georgia, serif" font-size="10" fill="#F6F1E5" fill-opacity="0.65" letter-spacing="1.1">Reddy</text>
    <text x="288" y="118" font-family="Georgia, serif" font-size="10" fill="#F6F1E5" fill-opacity="0.65" letter-spacing="1.1">Sharma · 7</text>
  </g>

  <!-- MEMORY TIER -->
  <g transform="translate(140,736)">
    <rect x="0" y="0" width="260" height="50" rx="8" ry="8" fill="#0F2E3D" stroke="#F6F1E5" stroke-width="1.1"/>
    <line x1="0" y1="0" x2="0" y2="50" stroke="#E28822" stroke-width="2.5"/>
    <text x="16" y="22" font-family="Georgia, serif" font-size="12" fill="#F6F1E5" letter-spacing="1.3">Graphify SQLite</text>
    <text x="16" y="38" font-family="Georgia, serif" font-size="9" fill="#F6F1E5" fill-opacity="0.55" letter-spacing="1.1">~/.vyasa/graph.sqlite · nodes + edges</text>
  </g>
  <g transform="translate(470,736)">
    <rect x="0" y="0" width="260" height="50" rx="8" ry="8" fill="#0F2E3D" stroke="#F6F1E5" stroke-width="1.1"/>
    <line x1="0" y1="0" x2="0" y2="50" stroke="#E28822" stroke-width="2.5"/>
    <text x="16" y="22" font-family="Georgia, serif" font-size="12" fill="#F6F1E5" letter-spacing="1.3">Qdrant Vector Index</text>
    <text x="16" y="38" font-family="Georgia, serif" font-size="9" fill="#F6F1E5" fill-opacity="0.55" letter-spacing="1.1">:6333 · embeddings · recall</text>
  </g>
  <g transform="translate(800,736)">
    <rect x="0" y="0" width="260" height="50" rx="8" ry="8" fill="#0F2E3D" stroke="#F6F1E5" stroke-width="1.1"/>
    <line x1="0" y1="0" x2="0" y2="50" stroke="#E28822" stroke-width="2.5"/>
    <text x="16" y="22" font-family="Georgia, serif" font-size="12" fill="#F6F1E5" letter-spacing="1.3">Per-employee SQLite</text>
    <text x="16" y="38" font-family="Georgia, serif" font-size="9" fill="#F6F1E5" fill-opacity="0.55" letter-spacing="1.1">~/.vyasa/fleet/&lt;id&gt;.db</text>
  </g>

  <!-- CONNECTIONS -->
  <g fill="none" stroke="#E28822" stroke-width="1.2" stroke-linecap="round">
    <path d="M 600 288 L 600 318"/>
    <path d="M 600 386 L 600 434"/>
    <path d="M 560 502 C 500 530, 400 540, 310 556"/>
    <path d="M 640 502 C 700 530, 800 540, 890 556"/>
    <path d="M 270 714 L 270 736"/>
    <path d="M 410 714 L 600 736"/>
    <path d="M 890 714 L 930 736"/>
    <path d="M 890 714 L 600 736" stroke-opacity="0.55"/>
    <path d="M 310 714 L 600 736" stroke-opacity="0.55"/>
    <path d="M 270 786 C 160 790, 90 600, 90 360 C 90 330, 220 332, 500 348" stroke-dasharray="3 4" stroke-opacity="0.4"/>
    <path d="M 930 786 C 1040 790, 1110 600, 1110 360 C 1110 330, 980 332, 700 348" stroke-dasharray="3 4" stroke-opacity="0.4"/>
  </g>

  <!-- arrow heads -->
  <g fill="#E28822">
    <polygon points="600,316 596,308 604,308"/>
    <polygon points="600,432 596,424 604,424"/>
    <polygon points="310,554 304,548 316,550"/>
    <polygon points="890,554 884,550 896,548"/>
    <polygon points="270,734 266,726 274,726"/>
    <polygon points="930,734 926,726 934,726"/>
  </g>

  <!-- legend -->
  <g transform="translate(40,700)" font-family="Georgia, serif" fill="#F6F1E5" fill-opacity="0.6">
    <text font-size="9" letter-spacing="1.8">LEGEND</text>
    <line x1="0" y1="6" x2="56" y2="6" stroke="#F6F1E5" stroke-opacity="0.3" stroke-width="0.5"/>
    <g font-size="9" transform="translate(0,20)">
      <line x1="0" y1="0" x2="22" y2="0" stroke="#E28822" stroke-width="1.2"/>
      <text x="28" y="3">request</text>
    </g>
    <g font-size="9" transform="translate(0,34)">
      <line x1="0" y1="0" x2="22" y2="0" stroke="#E28822" stroke-width="1.2" stroke-dasharray="3 4" stroke-opacity="0.6"/>
      <text x="28" y="3">recall</text>
    </g>
  </g>
</svg>
