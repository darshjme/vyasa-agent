# SPDX-License-Identifier: Apache-2.0
name: release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version ${VERSION}"

      - name: Build distributions
        run: uv build

      - name: Generate SHA256 manifest
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum ./* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload dist artefact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14

  publish-pypi:
    name: publish to PyPI (trusted publisher)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/vyasa-agent
    permissions:
      id-token: write
    steps:
      - name: Download dist artefact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Strip manifest before upload
        run: rm -f dist/SHA256SUMS.txt

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true

  github-release:
    name: create GitHub release
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download dist artefact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract CHANGELOG section for this tag
        id: changelog
        shell: bash
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          if [[ -f CHANGELOG.md ]]; then
            awk -v ver="$VERSION" '
              BEGIN { capture = 0 }
              /^## \[/ {
                if (capture) { exit }
                if ($0 ~ "\\[" ver "\\]") { capture = 1; print; next }
              }
              capture { print }
            ' CHANGELOG.md > RELEASE_NOTES.md
            if [[ ! -s RELEASE_NOTES.md ]]; then
              echo "Release ${VERSION}" > RELEASE_NOTES.md
            fi
          else
            echo "Release ${VERSION}" > RELEASE_NOTES.md
          fi
          echo "Release notes:"
          cat RELEASE_NOTES.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
