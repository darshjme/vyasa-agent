# SPDX-License-Identifier: Apache-2.0
name: license-check

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: license-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spdx-and-notice:
    name: SPDX headers + NOTICE integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Verify SPDX headers on every vyasa_agent/*.py
        shell: bash
        run: |
          set -euo pipefail
          MARKER='# SPDX-License-Identifier: Apache-2.0'
          MISSING=0
          while IFS= read -r -d '' file; do
            # Skip empty files (init stubs can be empty but still must carry marker
            # if non-empty; truly empty files are allowed).
            if [[ ! -s "$file" ]]; then
              continue
            fi
            if ! head -n 5 "$file" | grep -qxF "$MARKER"; then
              echo "::error file=${file}::missing SPDX header '${MARKER}' in first 5 lines"
              MISSING=$((MISSING + 1))
            fi
          done < <(find vyasa_agent -type f -name '*.py' -print0)
          if [[ "$MISSING" -gt 0 ]]; then
            echo "::error title=license-check::$MISSING Python file(s) missing SPDX header"
            exit 1
          fi
          echo "All vyasa_agent/**/*.py carry the SPDX marker."

      - name: Verify NOTICE unchanged (unless PR is labelled 'deps')
        if: github.event_name == 'pull_request'
        env:
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          git fetch origin "$BASE_SHA" --depth=1 || true
          if git diff --name-only "$BASE_SHA" HEAD | grep -qx 'NOTICE'; then
            if echo "$PR_LABELS" | grep -q '"deps"'; then
              echo "NOTICE changed but PR carries 'deps' label — accepted."
            else
              echo "::error file=NOTICE::NOTICE modified without 'deps' label"
              echo "Attach the 'deps' label when amending NOTICE for a dependency update."
              exit 1
            fi
          else
            echo "NOTICE unchanged."
          fi

      - name: Verify NOTICE integrity on main push
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          test -s NOTICE
          echo "NOTICE present on push."
